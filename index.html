<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>bailey99beats</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    input::placeholder { color: rgba(255,255,255,0.25); }
    @keyframes wave { 0% { height: 4px; } 100% { height: 24px; } }
    @keyframes miniWave { 0% { height: 4px; } 100% { height: 16px; } }
    @keyframes float { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-20px) scale(1.05); } 66% { transform: translate(-20px,15px) scale(0.95); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const CATEGORIES = ["All", "Trap", "Afrobeat", "Lo-Fi", "Drill", "R&B", "Hip Hop", "Other"];
    const GRADIENT_PRESETS = [
      "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
      "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
      "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
      "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
      "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
      "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)",
      "linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)",
      "linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)",
      "linear-gradient(135deg, #f6d365 0%, #fda085 100%)",
      "linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)",
      "linear-gradient(135deg, #c471f5 0%, #fa71cd 100%)",
      "linear-gradient(135deg, #48c6ef 0%, #6f86d6 100%)",
    ];

    function formatTime(sec) {
      if (!sec || isNaN(sec)) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ":" + (s < 10 ? "0" : "") + s;
    }

    function GlassCard({ children, style, onClick }) {
      return (
        <div onClick={onClick} style={{
          background: "rgba(255,255,255,0.08)",
          backdropFilter: "blur(40px)",
          WebkitBackdropFilter: "blur(40px)",
          borderRadius: "20px",
          border: "1px solid rgba(255,255,255,0.12)",
          boxShadow: "0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1)",
          ...style
        }}>{children}</div>
      );
    }

    function WaveformVisualizer({ isPlaying }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: "2px", height: "32px", padding: "0 4px" }}>
          {Array.from({ length: 40 }).map((_, i) => (
            <div key={i} style={{
              width: "3px", borderRadius: "2px",
              background: "linear-gradient(to top, rgba(255,255,255,0.5), #fff)",
              height: isPlaying ? undefined : (6 + Math.sin(i * 0.5) * 4) + "px",
              animation: isPlaying ? "wave 0.8s ease-in-out infinite alternate" : "none",
              animationDelay: (i * 0.03) + "s", opacity: 0.7
            }} />
          ))}
        </div>
      );
    }

    function BeatCard({ beat, isActive, isPlaying, onPlay, index }) {
      return (
        <div onClick={onPlay} style={{
          display: "flex", alignItems: "center", gap: "14px", padding: "12px 16px", borderRadius: "16px",
          background: isActive ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.03)",
          border: isActive ? "1px solid rgba(255,255,255,0.18)" : "1px solid transparent",
          cursor: "pointer", transition: "all 0.3s ease",
          animation: "slideUp 0.5s ease forwards", animationDelay: (index * 0.05) + "s", opacity: 0
        }}>
          <div style={{
            width: "52px", height: "52px", borderRadius: "12px", background: beat.gradient, flexShrink: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
            boxShadow: isActive ? "0 4px 20px rgba(0,0,0,0.3)" : "0 2px 8px rgba(0,0,0,0.2)",
          }}>
            {isActive && isPlaying ? (
              <div style={{ display: "flex", gap: "3px", alignItems: "center" }}>
                {[0,1,2].map(i => <div key={i} style={{ width: "3px", background: "white", borderRadius: "2px", animation: "miniWave 0.6s ease-in-out infinite alternate", animationDelay: (i*0.15)+"s" }} />)}
              </div>
            ) : (
              <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            )}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ color: isActive ? "#fff" : "rgba(255,255,255,0.9)", fontSize: "15px", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{beat.title}</div>
            <div style={{ color: "rgba(255,255,255,0.45)", fontSize: "13px", marginTop: "2px" }}>{beat.category}{beat.bpm ? " · " + beat.bpm + " BPM" : ""}</div>
          </div>
          <div style={{ color: "rgba(255,255,255,0.35)", fontSize: "13px", flexShrink: 0 }}>{beat.duration || "--:--"}</div>
        </div>
      );
    }

    function NowPlayingBar({ beat, isPlaying, onToggle, onNext, onPrev, progress, duration, onSeek, expanded, setExpanded }) {
      if (!beat) return null;

      if (expanded) {
        return (
          <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "#000", display: "flex", flexDirection: "column", overflow: "hidden" }}>
            <div style={{ position: "absolute", inset: 0, background: beat.gradient, opacity: 0.35, filter: "blur(80px)" }} />
            <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.4)" }} />
            <div style={{ position: "relative", zIndex: 1, flex: 1, display: "flex", flexDirection: "column", padding: "60px 32px 40px", maxWidth: "500px", margin: "0 auto", width: "100%" }}>
              <div onClick={() => setExpanded(false)} style={{ textAlign: "center", marginBottom: "40px", cursor: "pointer" }}>
                <div style={{ width: "36px", height: "5px", background: "rgba(255,255,255,0.3)", borderRadius: "3px", margin: "0 auto" }} />
              </div>
              <div style={{ width: "min(300px, 70vw)", height: "min(300px, 70vw)", borderRadius: "24px", background: beat.gradient, margin: "0 auto 40px", boxShadow: "0 20px 60px rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", animation: isPlaying ? "pulse 3s ease-in-out infinite" : "none" }}>
                <svg width="60" height="60" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
              </div>
              <div style={{ textAlign: "center", marginBottom: "32px" }}>
                <div style={{ color: "#fff", fontSize: "22px", fontWeight: 700, marginBottom: "6px" }}>{beat.title}</div>
                <div style={{ color: "rgba(255,255,255,0.5)", fontSize: "16px" }}>bailey99beats{beat.bpm ? " · " + beat.bpm + " BPM" : ""}</div>
              </div>
              <WaveformVisualizer isPlaying={isPlaying} />
              <div style={{ margin: "20px 0 8px" }}>
                <div onClick={e => { const r = e.currentTarget.getBoundingClientRect(); onSeek((e.clientX - r.left) / r.width); }} style={{ height: "6px", background: "rgba(255,255,255,0.15)", borderRadius: "3px", cursor: "pointer", position: "relative" }}>
                  <div style={{ height: "100%", width: (duration ? (progress/duration)*100 : 0)+"%", background: "rgba(255,255,255,0.9)", borderRadius: "3px", transition: "width 0.1s linear" }} />
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: "8px", color: "rgba(255,255,255,0.4)", fontSize: "12px" }}>
                  <span>{formatTime(progress)}</span><span>{formatTime(duration)}</span>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "40px", marginTop: "16px" }}>
                <button onClick={onPrev} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}><svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button onClick={onToggle} style={{ width: "72px", height: "72px", borderRadius: "50%", background: "rgba(255,255,255,0.95)", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>
                  {isPlaying ? <svg width="30" height="30" viewBox="0 0 24 24" fill="#000"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> : <svg width="30" height="30" viewBox="0 0 24 24" fill="#000" style={{ marginLeft: "3px" }}><path d="M8 5v14l11-7z"/></svg>}
                </button>
                <button onClick={onNext} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}><svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 50, padding: "8px 12px 28px" }}>
          <GlassCard onClick={() => setExpanded(true)} style={{ padding: "10px 14px", cursor: "pointer", background: "rgba(30,30,30,0.85)", backdropFilter: "blur(50px)", WebkitBackdropFilter: "blur(50px)", position: "relative" }}>
            <div style={{ position: "absolute", top: 0, left: "14px", right: "14px", height: "2px", background: "rgba(255,255,255,0.1)", borderRadius: "1px" }}>
              <div style={{ height: "100%", width: (duration ? (progress/duration)*100 : 0)+"%", background: "rgba(255,255,255,0.7)", borderRadius: "1px", transition: "width 0.3s linear" }} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <div style={{ width: "44px", height: "44px", borderRadius: "10px", background: beat.gradient, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.8)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: "#fff", fontSize: "14px", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{beat.title}</div>
                <div style={{ color: "rgba(255,255,255,0.45)", fontSize: "12px" }}>bailey99beats</div>
              </div>
              <button onClick={e => { e.stopPropagation(); onToggle(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}>
                {isPlaying ? <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> : <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>}
              </button>
              <button onClick={e => { e.stopPropagation(); onNext(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
              </button>
            </div>
          </GlassCard>
        </div>
      );
    }

    function UploadModal({ onClose, onUpload }) {
      const [title, setTitle] = useState("");
      const [category, setCategory] = useState("Trap");
      const [bpm, setBpm] = useState("");
      const [file, setFile] = useState(null);
      const fileRef = useRef();

      const handleSubmit = () => {
        if (!file || !title) return;
        const url = URL.createObjectURL(file);
        const gradient = GRADIENT_PRESETS[Math.floor(Math.random() * GRADIENT_PRESETS.length)];
        onUpload({ id: Date.now(), title, category, bpm: bpm || null, gradient, url, file, duration: null });
        onClose();
      };

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center", background: "rgba(0,0,0,0.6)", animation: "fadeIn 0.3s ease" }} onClick={onClose}>
          <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: "500px", background: "rgba(28,28,30,0.95)", backdropFilter: "blur(50px)", WebkitBackdropFilter: "blur(50px)", borderRadius: "24px 24px 0 0", padding: "28px 24px 40px", border: "1px solid rgba(255,255,255,0.1)", borderBottom: "none", animation: "slideUpModal 0.4s ease" }}>
            <div style={{ width: "36px", height: "5px", background: "rgba(255,255,255,0.2)", borderRadius: "3px", margin: "0 auto 24px" }} />
            <div style={{ color: "#fff", fontSize: "20px", fontWeight: 700, textAlign: "center", marginBottom: "24px" }}>Upload Beat</div>
            <div onClick={() => fileRef.current?.click()} style={{ border: "2px dashed rgba(255,255,255,0.15)", borderRadius: "16px", padding: "24px", textAlign: "center", cursor: "pointer", marginBottom: "20px", background: file ? "rgba(255,255,255,0.05)" : "transparent" }}>
              <input ref={fileRef} type="file" accept="audio/*" style={{ display: "none" }} onChange={e => setFile(e.target.files?.[0] || null)} />
              {file ? <div style={{ color: "rgba(255,255,255,0.8)", fontSize: "14px" }}>{file.name}</div> : (
                <><svg width="32" height="32" viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)" style={{ marginBottom: "8px" }}><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg><div style={{ color: "rgba(255,255,255,0.4)", fontSize: "14px" }}>Tap to select audio file</div></>
              )}
            </div>
            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Beat title" style={{ width: "100%", padding: "14px 16px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: "15px", outline: "none", marginBottom: "12px", boxSizing: "border-box", fontFamily: "inherit" }} />
            <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", marginBottom: "12px" }}>
              {CATEGORIES.filter(c => c !== "All").map(cat => (
                <button key={cat} onClick={() => setCategory(cat)} style={{ padding: "8px 16px", borderRadius: "20px", border: "1px solid rgba(255,255,255,0.12)", background: category === cat ? "rgba(255,255,255,0.18)" : "rgba(255,255,255,0.04)", color: category === cat ? "#fff" : "rgba(255,255,255,0.5)", fontSize: "13px", fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>{cat}</button>
              ))}
            </div>
            <input value={bpm} onChange={e => setBpm(e.target.value.replace(/\D/g, ""))} placeholder="BPM (optional)" style={{ width: "100%", padding: "14px 16px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.06)", color: "#fff", fontSize: "15px", outline: "none", marginBottom: "24px", boxSizing: "border-box", fontFamily: "inherit" }} />
            <button onClick={handleSubmit} disabled={!file || !title} style={{ width: "100%", padding: "16px", borderRadius: "14px", border: "none", background: (!file || !title) ? "rgba(255,255,255,0.1)" : "rgba(255,255,255,0.95)", color: (!file || !title) ? "rgba(255,255,255,0.3)" : "#000", fontSize: "16px", fontWeight: 700, cursor: (!file || !title) ? "default" : "pointer", fontFamily: "inherit" }}>Add to Library</button>
          </div>
        </div>
      );
    }

    function App() {
      const [beats, setBeats] = useState([]);
      const [activeCategory, setActiveCategory] = useState("All");
      const [currentBeat, setCurrentBeat] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [duration, setDuration] = useState(0);
      const [showUpload, setShowUpload] = useState(false);
      const [expanded, setExpanded] = useState(false);
      const audioRef = useRef(new Audio());

      const filteredBeats = activeCategory === "All" ? beats : beats.filter(b => b.category === activeCategory);

      const playBeat = useCallback(beat => {
        const audio = audioRef.current;
        if (currentBeat?.id === beat.id) {
          if (isPlaying) { audio.pause(); setIsPlaying(false); } else { audio.play(); setIsPlaying(true); }
          return;
        }
        audio.src = beat.url;
        audio.play();
        setCurrentBeat(beat);
        setIsPlaying(true);
      }, [currentBeat, isPlaying]);

      const playNext = useCallback(() => {
        if (!currentBeat || filteredBeats.length === 0) return;
        const idx = filteredBeats.findIndex(b => b.id === currentBeat.id);
        const next = filteredBeats[(idx + 1) % filteredBeats.length];
        audioRef.current.src = next.url; audioRef.current.play();
        setCurrentBeat(next); setIsPlaying(true);
      }, [currentBeat, filteredBeats]);

      const playPrev = useCallback(() => {
        if (!currentBeat || filteredBeats.length === 0) return;
        const idx = filteredBeats.findIndex(b => b.id === currentBeat.id);
        const prev = filteredBeats[(idx - 1 + filteredBeats.length) % filteredBeats.length];
        audioRef.current.src = prev.url; audioRef.current.play();
        setCurrentBeat(prev); setIsPlaying(true);
      }, [currentBeat, filteredBeats]);

      const handleSeek = useCallback(pct => { if (duration) audioRef.current.currentTime = pct * duration; }, [duration]);

      useEffect(() => {
        const audio = audioRef.current;
        const onTime = () => setProgress(audio.currentTime);
        const onDur = () => {
          setDuration(audio.duration);
          if (currentBeat) setBeats(prev => prev.map(b => b.id === currentBeat.id ? { ...b, duration: formatTime(audio.duration) } : b));
        };
        const onEnd = () => playNext();
        audio.addEventListener("timeupdate", onTime);
        audio.addEventListener("loadedmetadata", onDur);
        audio.addEventListener("ended", onEnd);
        return () => { audio.removeEventListener("timeupdate", onTime); audio.removeEventListener("loadedmetadata", onDur); audio.removeEventListener("ended", onEnd); };
      }, [currentBeat, playNext]);

      return (
        <div style={{ minHeight: "100vh", background: "#000", color: "#fff", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none" }}>
            <div style={{ position: "absolute", width: "400px", height: "400px", borderRadius: "50%", background: "radial-gradient(circle, rgba(120,80,255,0.15) 0%, transparent 70%)", top: "-100px", right: "-100px", animation: "float 12s ease-in-out infinite" }} />
            <div style={{ position: "absolute", width: "300px", height: "300px", borderRadius: "50%", background: "radial-gradient(circle, rgba(255,80,150,0.1) 0%, transparent 70%)", bottom: "100px", left: "-80px", animation: "float 15s ease-in-out infinite reverse" }} />
          </div>
          <div style={{ position: "relative", zIndex: 1, padding: "60px 20px 120px", maxWidth: "500px", margin: "0 auto" }}>
            <div style={{ marginBottom: "32px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "4px" }}>
                <div style={{ width: "40px", height: "40px", borderRadius: "12px", background: "linear-gradient(135deg, #c9a74e 0%, #f0d68a 50%, #c9a74e 100%)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
                <div style={{ fontSize: "28px", fontWeight: 800, letterSpacing: "-0.5px" }}>bailey99beats</div>
              </div>
              <div style={{ color: "rgba(255,255,255,0.4)", fontSize: "14px", marginTop: "4px", marginLeft: "52px" }}>{beats.length} beat{beats.length !== 1 ? "s" : ""} in library</div>
            </div>
            <div style={{ display: "flex", gap: "8px", overflowX: "auto", paddingBottom: "8px", marginBottom: "24px", scrollbarWidth: "none" }}>
              {CATEGORIES.map(cat => (
                <button key={cat} onClick={() => setActiveCategory(cat)} style={{ padding: "8px 18px", borderRadius: "20px", border: "none", background: activeCategory === cat ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.08)", color: activeCategory === cat ? "#000" : "rgba(255,255,255,0.6)", fontSize: "13px", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0, fontFamily: "inherit" }}>{cat}</button>
              ))}
            </div>
            <GlassCard onClick={() => setShowUpload(true)} style={{ padding: "18px 20px", marginBottom: "20px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: "10px", border: "1px dashed rgba(255,255,255,0.15)", background: "rgba(255,255,255,0.03)" }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
              <span style={{ color: "rgba(255,255,255,0.5)", fontSize: "15px", fontWeight: 500 }}>Upload New Beat</span>
            </GlassCard>
            <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
              {filteredBeats.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 20px", color: "rgba(255,255,255,0.25)", fontSize: "15px" }}>
                  {beats.length === 0 ? "Your library is empty. Upload your first beat!" : "No beats in " + activeCategory}
                </div>
              ) : filteredBeats.map((beat, i) => (
                <BeatCard key={beat.id} beat={beat} index={i} isActive={currentBeat?.id === beat.id} isPlaying={isPlaying && currentBeat?.id === beat.id} onPlay={() => playBeat(beat)} />
              ))}
            </div>
          </div>
          <NowPlayingBar beat={currentBeat} isPlaying={isPlaying} onToggle={() => { if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); } else { audioRef.current.play(); setIsPlaying(true); } }} onNext={playNext} onPrev={playPrev} progress={progress} duration={duration} onSeek={handleSeek} expanded={expanded} setExpanded={setExpanded} />
          {showUpload && <UploadModal onClose={() => setShowUpload(false)} onUpload={beat => setBeats(prev => [beat, ...prev])} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

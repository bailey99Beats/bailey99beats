<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>bailey99beats</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a1a; overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; color: #fff; }
    ::-webkit-scrollbar { display: none; }
    input::placeholder { color: rgba(255,255,255,0.3); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes wave { 0% { height: 4px; } 100% { height: 22px; } }
    @keyframes miniWave { 0% { height: 4px; } 100% { height: 14px; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback, useMemo } = React;

    /* ── helpers ── */
    function formatTime(s) {
      if (!s || isNaN(s)) return "0:00";
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m + ":" + (sec < 10 ? "0" : "") + sec;
    }
    function formatSize(bytes) {
      if (!bytes) return "0MB";
      const mb = bytes / (1024 * 1024);
      return mb < 1 ? Math.round(mb * 1000) + "KB" : Math.round(mb) + "MB";
    }
    function totalDuration(beats) {
      const t = beats.reduce((a, b) => a + (b.durationSec || 0), 0);
      return t < 60 ? Math.round(t) + "s" : Math.round(t / 60) + "m";
    }
    function totalSize(beats) {
      return formatSize(beats.reduce((a, b) => a + (b.fileSize || 0), 0));
    }

    const GRADIENT_PRESETS = [
      "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
      "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
      "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
      "linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)",
      "linear-gradient(135deg, #fa709a 0%, #fee140 100%)",
      "linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)",
    ];

    /* ── glass card ── */
    const glass = {
      background: "rgba(255,255,255,0.06)",
      backdropFilter: "blur(40px)",
      WebkitBackdropFilter: "blur(40px)",
      borderRadius: "16px",
      border: "1px solid rgba(255,255,255,0.08)",
    };

    /* ── page bg ── */
    function PageBg() {
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 0, pointerEvents: "none", background: "linear-gradient(180deg, #1a0a2e 0%, #0f0a1e 40%, #0a0a1a 100%)" }}>
          <div style={{ position: "absolute", width: "500px", height: "500px", borderRadius: "50%", background: "radial-gradient(circle, rgba(120,40,200,0.15) 0%, transparent 70%)", top: "-150px", left: "50%", transform: "translateX(-50%)" }} />
        </div>
      );
    }

    /* ── status bar ── */
    function StatusBar() {
      return (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 20px 0", height: "44px" }}>
          <span style={{ fontSize: "15px", fontWeight: 600 }}>9:41</span>
          <div style={{ display: "flex", gap: "4px", alignItems: "center" }}>
            <div style={{ width: "18px", height: "10px", borderRadius: "2px", background: "rgba(255,255,255,0.3)" }} />
            <div style={{ width: "10px", height: "10px", borderRadius: "50%", background: "rgba(255,255,255,0.5)" }} />
          </div>
        </div>
      );
    }

    /* ── bottom tab bar ── */
    function TabBar({ active, setActive, hasNowPlaying }) {
      const tabs = [
        { id: "home", label: "Home", icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
        { id: "library", label: "Library", icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M4 6h2v12H4zM9 6h2v12H9zM14 6h2v12h-2zM19 6h2v12h-2z"/></svg> },
        { id: "upload", label: "Upload", icon: () => null, isSpecial: true },
        { id: "profile", label: "Profile", icon: (c) => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
      ];

      return (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 80, background: "rgba(10,10,26,0.9)", backdropFilter: "blur(30px)", WebkitBackdropFilter: "blur(30px)", borderTop: "1px solid rgba(255,255,255,0.06)", paddingBottom: "env(safe-area-inset-bottom, 16px)", transition: "transform 0.3s ease", transform: hasNowPlaying ? "translateY(0)" : "translateY(0)" }}>
          <div style={{ display: "flex", justifyContent: "space-around", alignItems: "center", padding: "8px 0 4px", maxWidth: "500px", margin: "0 auto" }}>
            {tabs.map(tab => {
              const isActive = active === tab.id;
              const color = isActive ? "#4a7dff" : "rgba(255,255,255,0.4)";
              if (tab.isSpecial) {
                return (
                  <div key={tab.id} onClick={() => setActive(tab.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "2px", cursor: "pointer" }}>
                    <div style={{ width: "48px", height: "48px", borderRadius: "50%", background: "#4a7dff", display: "flex", alignItems: "center", justifyContent: "center", marginTop: "-20px", boxShadow: "0 4px 20px rgba(74,125,255,0.4)" }}>
                      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <span style={{ fontSize: "10px", color: isActive ? "#4a7dff" : "rgba(255,255,255,0.4)", fontWeight: 500 }}>{tab.label}</span>
                  </div>
                );
              }
              return (
                <div key={tab.id} onClick={() => setActive(tab.id)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "4px", cursor: "pointer", padding: "4px 16px" }}>
                  {tab.icon(color)}
                  <span style={{ fontSize: "10px", color, fontWeight: 500 }}>{tab.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ── HOME SCREEN ── */
    function HomeScreen({ beats, onPlay, currentBeat, isPlaying }) {
      const statCards = [
        { label: "Tracks", value: beats.length, gradient: "linear-gradient(135deg, #7b2ff7 0%, #c471f5 100%)", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg> },
        { label: "Storage", value: totalSize(beats), gradient: "linear-gradient(135deg, #00b4d8 0%, #00f2fe 100%)", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M2 20h20v-4H2v4zm2-3h2v2H4v-2zM2 4v4h20V4H2zm4 3H4V5h2v2zm-4 7h20v-4H2v4zm2-3h2v2H4v-2z"/></svg> },
        { label: "Duration", value: totalDuration(beats), gradient: "linear-gradient(135deg, #7b2ff7 0%, #c471f5 100%)", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg> },
        { label: "Albums", value: new Set(beats.map(b => b.category)).size || 0, gradient: "linear-gradient(135deg, #ff6b35 0%, #f72585 100%)", icon: <svg width="24" height="24" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg> },
      ];

      return (
        <div style={{ padding: "0 20px 20px", animation: "fadeIn 0.4s ease" }}>
          <div style={{ marginBottom: "28px" }}>
            <h1 style={{ fontSize: "32px", fontWeight: 700, marginBottom: "4px" }}>Library</h1>
            <p style={{ fontSize: "14px", color: "rgba(255,255,255,0.4)" }}>Your music collection</p>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "32px" }}>
            {statCards.map((card, i) => (
              <div key={i} style={{ background: card.gradient, borderRadius: "16px", padding: "18px 20px", position: "relative", overflow: "hidden", minHeight: "90px", animation: "slideUp 0.5s ease forwards", animationDelay: (i * 0.08) + "s", opacity: 0 }}>
                <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.8)", fontWeight: 500, marginBottom: "4px" }}>{card.label}</div>
                <div style={{ fontSize: "32px", fontWeight: 700 }}>{card.value}</div>
                <div style={{ position: "absolute", right: "16px", top: "50%", transform: "translateY(-50%)", opacity: 0.6 }}>{card.icon}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
            <h2 style={{ fontSize: "20px", fontWeight: 700 }}>Recent</h2>
            <span style={{ fontSize: "14px", color: "#4a7dff", cursor: "pointer", fontWeight: 500 }}>See All</span>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: "0" }}>
            {beats.length === 0 ? (
              <div style={{ textAlign: "center", padding: "40px 20px", color: "rgba(255,255,255,0.25)", fontSize: "14px" }}>
                No tracks yet. Upload your first beat!
              </div>
            ) : beats.slice(0, 5).map((beat, i) => (
              <TrackRow key={beat.id} beat={beat} onPlay={() => onPlay(beat)} isActive={currentBeat?.id === beat.id} isPlaying={isPlaying && currentBeat?.id === beat.id} index={i} />
            ))}
          </div>
        </div>
      );
    }

    /* ── track row ── */
    function TrackRow({ beat, onPlay, isActive, isPlaying, index }) {
      return (
        <div onClick={onPlay} style={{
          display: "flex", alignItems: "center", gap: "14px", padding: "14px 4px",
          borderBottom: "1px solid rgba(255,255,255,0.04)",
          cursor: "pointer", animation: "slideUp 0.4s ease forwards",
          animationDelay: (index * 0.05) + "s", opacity: 0
        }}>
          <div style={{
            width: "48px", height: "48px", borderRadius: "10px", flexShrink: 0,
            background: beat.artworkUrl ? "none" : (beat.gradient || "linear-gradient(135deg, #667eea, #764ba2)"),
            display: "flex", alignItems: "center", justifyContent: "center",
            overflow: "hidden", position: "relative"
          }}>
            {beat.artworkUrl && <img src={beat.artworkUrl} style={{ position: "absolute", width: "100%", height: "100%", objectFit: "cover" }} />}
            {isActive && isPlaying ? (
              <div style={{ display: "flex", gap: "2px", alignItems: "center", position: "relative", zIndex: 1 }}>
                {[0,1,2].map(j => <div key={j} style={{ width: "3px", background: "#fff", borderRadius: "2px", animation: "miniWave 0.6s ease-in-out infinite alternate", animationDelay: (j*0.15)+"s" }} />)}
              </div>
            ) : (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white" style={{ position: "relative", zIndex: 1 }}><path d="M8 5v14l11-7z"/></svg>
            )}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: "15px", fontWeight: 600, color: isActive ? "#4a7dff" : "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{beat.title}</div>
            <div style={{ fontSize: "13px", color: "rgba(255,255,255,0.4)", marginTop: "2px" }}>
              {beat.category || "bailey99beats"} &middot; {beat.duration || "--:--"}
            </div>
          </div>
          <div style={{ cursor: "pointer", padding: "8px", color: "rgba(255,255,255,0.3)" }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
          </div>
        </div>
      );
    }

    /* ── LIBRARY SCREEN ── */
    function LibraryScreen({ beats, onPlay, currentBeat, isPlaying }) {
      return (
        <div style={{ padding: "0 20px 20px", animation: "fadeIn 0.4s ease" }}>
          <div style={{ marginBottom: "20px" }}>
            <h1 style={{ fontSize: "32px", fontWeight: 700, marginBottom: "4px" }}>All Songs</h1>
            <p style={{ fontSize: "14px", color: "rgba(255,255,255,0.4)" }}>{beats.length} track{beats.length !== 1 ? "s" : ""}</p>
          </div>

          {beats.length === 0 ? (
            <div style={{ ...glass, padding: "40px 20px", textAlign: "center", color: "rgba(255,255,255,0.25)", fontSize: "14px" }}>
              Your library is empty. Upload some beats!
            </div>
          ) : (
            <div style={{ ...glass, padding: "4px 16px" }}>
              {beats.map((beat, i) => (
                <TrackRow key={beat.id} beat={beat} onPlay={() => onPlay(beat)} isActive={currentBeat?.id === beat.id} isPlaying={isPlaying && currentBeat?.id === beat.id} index={i} />
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ── UPLOAD SCREEN ── */
    function UploadScreen({ onUpload }) {
      const [file, setFile] = useState(null);
      const [artwork, setArtwork] = useState(null);
      const [artworkPreview, setArtworkPreview] = useState(null);
      const [title, setTitle] = useState("");
      const [category, setCategory] = useState("Trap");
      const [bpm, setBpm] = useState("");
      const [step, setStep] = useState(1);
      const fileRef = useRef();
      const artRef = useRef();

      const formats = ["MP3", "WAV", "FLAC", "M4A", "AAC", "OGG"];

      const handleFile = (e) => {
        const f = e.target.files?.[0];
        if (f) { setFile(f); setStep(2); }
      };

      const handleArtwork = (e) => {
        const img = e.target.files?.[0];
        if (!img) return;
        setArtwork(img);
        const reader = new FileReader();
        reader.onload = (ev) => setArtworkPreview(ev.target.result);
        reader.readAsDataURL(img);
      };

      const handleSubmit = () => {
        if (!file || !title) return;
        const url = URL.createObjectURL(file);
        const gradient = GRADIENT_PRESETS[Math.floor(Math.random() * GRADIENT_PRESETS.length)];
        onUpload({ id: Date.now(), title, category, bpm: bpm || null, gradient, artworkUrl: artworkPreview, url, file, duration: null, durationSec: 0, fileSize: file.size });
        setFile(null); setArtwork(null); setArtworkPreview(null); setTitle(""); setBpm(""); setStep(1);
      };

      if (step === 1) {
        return (
          <div style={{ padding: "0 20px 20px", animation: "fadeIn 0.4s ease" }}>
            <div style={{ textAlign: "center", marginBottom: "28px" }}>
              <h1 style={{ fontSize: "32px", fontWeight: 700, marginBottom: "6px" }}>Upload Music</h1>
              <p style={{ fontSize: "14px", color: "rgba(255,255,255,0.4)" }}>Add tracks to your library</p>
            </div>

            <div onClick={() => fileRef.current?.click()} style={{ ...glass, padding: "48px 20px", textAlign: "center", cursor: "pointer", marginBottom: "28px" }}>
              <input ref={fileRef} type="file" accept="audio/*" style={{ display: "none" }} onChange={handleFile} />
              <div style={{ width: "64px", height: "64px", borderRadius: "50%", background: "rgba(255,255,255,0.08)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4a7dff" strokeWidth="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </div>
              <div style={{ fontSize: "16px", fontWeight: 600, marginBottom: "6px" }}>Add Music</div>
              <div style={{ fontSize: "13px" }}><span style={{ color: "#4a7dff" }}>Tap to browse</span><span style={{ color: "rgba(255,255,255,0.4)" }}> or drag and drop</span></div>
            </div>

            <div style={{ marginBottom: "12px" }}>
              <h3 style={{ fontSize: "16px", fontWeight: 600, marginBottom: "12px" }}>Supported Formats</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
                {formats.map(f => (
                  <div key={f} style={{ ...glass, padding: "12px", textAlign: "center", fontSize: "14px", color: "rgba(255,255,255,0.6)" }}>{f}</div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ padding: "0 20px 20px", animation: "fadeIn 0.4s ease" }}>
          <div style={{ textAlign: "center", marginBottom: "24px" }}>
            <h1 style={{ fontSize: "28px", fontWeight: 700, marginBottom: "6px" }}>Track Details</h1>
            <p style={{ fontSize: "13px", color: "rgba(255,255,255,0.4)" }}>{file?.name}</p>
          </div>

          <div style={{ display: "flex", gap: "16px", marginBottom: "20px", alignItems: "flex-start" }}>
            <div onClick={() => artRef.current?.click()} style={{ width: "100px", height: "100px", borderRadius: "16px", border: "2px dashed rgba(255,255,255,0.12)", cursor: "pointer", overflow: "hidden", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", background: artworkPreview ? "none" : "rgba(255,255,255,0.03)" }}>
              <input ref={artRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleArtwork} />
              {artworkPreview ? (
                <img src={artworkPreview} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
              ) : (
                <div style={{ textAlign: "center" }}>
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.2)"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                  <div style={{ color: "rgba(255,255,255,0.25)", fontSize: "10px", marginTop: "2px" }}>Cover Art</div>
                </div>
              )}
            </div>
            <div style={{ flex: 1 }}>
              <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Beat title" style={{ width: "100%", padding: "12px 14px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.08)", background: "rgba(255,255,255,0.05)", color: "#fff", fontSize: "15px", outline: "none", marginBottom: "10px", boxSizing: "border-box", fontFamily: "inherit" }} />
              <input value={bpm} onChange={e => setBpm(e.target.value.replace(/\D/g, ""))} placeholder="BPM (optional)" style={{ width: "100%", padding: "12px 14px", borderRadius: "12px", border: "1px solid rgba(255,255,255,0.08)", background: "rgba(255,255,255,0.05)", color: "#fff", fontSize: "15px", outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
            </div>
          </div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", marginBottom: "24px" }}>
            {["Trap","Afrobeat","Lo-Fi","Drill","R&B","Hip Hop","Other"].map(cat => (
              <button key={cat} onClick={() => setCategory(cat)} style={{ padding: "8px 18px", borderRadius: "20px", border: "1px solid rgba(255,255,255,0.1)", background: category === cat ? "rgba(74,125,255,0.2)" : "rgba(255,255,255,0.04)", color: category === cat ? "#4a7dff" : "rgba(255,255,255,0.5)", fontSize: "13px", fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>{cat}</button>
            ))}
          </div>

          <div style={{ display: "flex", gap: "12px" }}>
            <button onClick={() => { setStep(1); setFile(null); }} style={{ flex: 1, padding: "14px", borderRadius: "14px", border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(255,255,255,0.6)", fontSize: "15px", fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Back</button>
            <button onClick={handleSubmit} disabled={!title} style={{ flex: 2, padding: "14px", borderRadius: "14px", border: "none", background: !title ? "rgba(74,125,255,0.3)" : "#4a7dff", color: !title ? "rgba(255,255,255,0.4)" : "#fff", fontSize: "15px", fontWeight: 600, cursor: !title ? "default" : "pointer", fontFamily: "inherit" }}>Upload Track</button>
          </div>
        </div>
      );
    }

    /* ── PROFILE SCREEN ── */
    function ProfileScreen() {
      const settings = ["Account Settings", "Storage Management", "Audio Quality"];
      return (
        <div style={{ padding: "0 20px 20px", animation: "fadeIn 0.4s ease" }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: "36px", marginTop: "20px" }}>
            <div style={{ width: "90px", height: "90px", borderRadius: "50%", background: "linear-gradient(135deg, #e040fb 0%, #f48fb1 100%)", display: "flex", alignItems: "center", justifyContent: "center", marginBottom: "16px" }}>
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div style={{ fontSize: "22px", fontWeight: 700, marginBottom: "4px" }}>bailey99beats</div>
            <div style={{ fontSize: "14px", color: "rgba(255,255,255,0.4)" }}>baileyerloi@gmail.com</div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            {settings.map((s, i) => (
              <div key={i} style={{ ...glass, padding: "16px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", animation: "slideUp 0.4s ease forwards", animationDelay: (i * 0.08) + "s", opacity: 0 }}>
                <span style={{ fontSize: "15px", fontWeight: 500 }}>{s}</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ── NOW PLAYING ── */
    function NowPlaying({ beat, isPlaying, onToggle, onNext, onPrev, progress, duration, onSeek, onClose }) {
      if (!beat) return null;
      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "#0a0a1a", display: "flex", flexDirection: "column", overflow: "hidden", animation: "fadeIn 0.3s ease" }}>
          <div style={{ position: "absolute", inset: 0, overflow: "hidden" }}>
            {beat.artworkUrl ? (
              <img src={beat.artworkUrl} style={{ width: "100%", height: "100%", objectFit: "cover", filter: "blur(60px) brightness(0.4)", transform: "scale(1.2)" }} />
            ) : (
              <div style={{ width: "100%", height: "100%", background: beat.gradient || "linear-gradient(135deg, #7b2ff7, #c471f5)", opacity: 0.3, filter: "blur(60px)" }} />
            )}
          </div>
          <div style={{ position: "absolute", inset: 0, background: "rgba(10,10,26,0.5)" }} />

          <div style={{ position: "relative", zIndex: 1, flex: 1, display: "flex", flexDirection: "column", padding: "50px 32px 40px", maxWidth: "500px", margin: "0 auto", width: "100%" }}>
            <div onClick={onClose} style={{ textAlign: "center", marginBottom: "32px", cursor: "pointer" }}>
              <div style={{ width: "40px", height: "5px", background: "rgba(255,255,255,0.25)", borderRadius: "3px", margin: "0 auto" }} />
            </div>

            <div style={{
              width: "min(280px, 65vw)", height: "min(280px, 65vw)", borderRadius: "20px", margin: "0 auto 36px",
              background: beat.artworkUrl ? "none" : (beat.gradient || "linear-gradient(135deg, #667eea, #764ba2)"),
              boxShadow: "0 20px 60px rgba(0,0,0,0.5)", overflow: "hidden",
              display: "flex", alignItems: "center", justifyContent: "center",
              animation: isPlaying ? "pulse 4s ease-in-out infinite" : "none"
            }}>
              {beat.artworkUrl ? (
                <img src={beat.artworkUrl} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
              ) : (
                <svg width="60" height="60" viewBox="0 0 24 24" fill="rgba(255,255,255,0.6)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
              )}
            </div>

            <div style={{ textAlign: "center", marginBottom: "28px" }}>
              <div style={{ fontSize: "22px", fontWeight: 700, marginBottom: "6px" }}>{beat.title}</div>
              <div style={{ fontSize: "15px", color: "rgba(255,255,255,0.45)" }}>bailey99beats{beat.bpm ? " \u00b7 " + beat.bpm + " BPM" : ""}</div>
            </div>

            {/* waveform */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "2px", height: "32px", marginBottom: "16px" }}>
              {Array.from({ length: 36 }).map((_, i) => (
                <div key={i} style={{
                  width: "3px", borderRadius: "2px",
                  background: "linear-gradient(to top, rgba(74,125,255,0.4), rgba(74,125,255,0.9))",
                  height: isPlaying ? undefined : (4 + Math.sin(i * 0.6) * 4) + "px",
                  animation: isPlaying ? "wave 0.8s ease-in-out infinite alternate" : "none",
                  animationDelay: (i * 0.03) + "s", opacity: 0.8
                }} />
              ))}
            </div>

            {/* progress */}
            <div style={{ marginBottom: "24px" }}>
              <div onClick={e => { const r = e.currentTarget.getBoundingClientRect(); onSeek((e.clientX - r.left) / r.width); }} style={{ height: "4px", background: "rgba(255,255,255,0.1)", borderRadius: "2px", cursor: "pointer" }}>
                <div style={{ height: "100%", width: (duration ? (progress / duration) * 100 : 0) + "%", background: "#4a7dff", borderRadius: "2px", transition: "width 0.1s linear" }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: "8px", fontSize: "12px", color: "rgba(255,255,255,0.35)" }}>
                <span>{formatTime(progress)}</span><span>{formatTime(duration)}</span>
              </div>
            </div>

            {/* controls */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "36px" }}>
              <button onClick={onPrev} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
              </button>
              <button onClick={onToggle} style={{ width: "68px", height: "68px", borderRadius: "50%", background: "#4a7dff", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 4px 24px rgba(74,125,255,0.4)" }}>
                {isPlaying ? (
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                ) : (
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff" style={{ marginLeft: "3px" }}><path d="M8 5v14l11-7z"/></svg>
                )}
              </button>
              <button onClick={onNext} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── MINI PLAYER BAR ── */
    function MiniPlayer({ beat, isPlaying, onToggle, onNext, progress, duration, onExpand }) {
      if (!beat) return null;
      return (
        <div style={{ position: "fixed", bottom: "72px", left: "12px", right: "12px", zIndex: 70 }}>
          <div onClick={onExpand} style={{ ...glass, background: "rgba(20,15,35,0.9)", padding: "10px 14px", cursor: "pointer", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "2px", background: "rgba(255,255,255,0.06)" }}>
              <div style={{ height: "100%", width: (duration ? (progress / duration) * 100 : 0) + "%", background: "#4a7dff", transition: "width 0.3s linear" }} />
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
              <div style={{ width: "42px", height: "42px", borderRadius: "8px", overflow: "hidden", flexShrink: 0, background: beat.artworkUrl ? "none" : (beat.gradient || "linear-gradient(135deg, #667eea, #764ba2)"), display: "flex", alignItems: "center", justifyContent: "center" }}>
                {beat.artworkUrl ? <img src={beat.artworkUrl} style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: "14px", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{beat.title}</div>
                <div style={{ fontSize: "11px", color: "rgba(255,255,255,0.4)" }}>bailey99beats</div>
              </div>
              <button onClick={e => { e.stopPropagation(); onToggle(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: "8px" }}>
                {isPlaying ? <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> : <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>}
              </button>
              <button onClick={e => { e.stopPropagation(); onNext(); }} style={{ background: "none", border: "none", cursor: "pointer", padding: "4px" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ── MAIN APP ── */
    function App() {
      const [beats, setBeats] = useState([]);
      const [activeTab, setActiveTab] = useState("home");
      const [currentBeat, setCurrentBeat] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [duration, setDuration] = useState(0);
      const [showNowPlaying, setShowNowPlaying] = useState(false);
      const audioRef = useRef(new Audio());

      const playBeat = useCallback(beat => {
        const audio = audioRef.current;
        if (currentBeat?.id === beat.id) {
          if (isPlaying) { audio.pause(); setIsPlaying(false); }
          else { audio.play(); setIsPlaying(true); }
          return;
        }
        audio.src = beat.url;
        audio.play();
        setCurrentBeat(beat);
        setIsPlaying(true);
      }, [currentBeat, isPlaying]);

      const playNext = useCallback(() => {
        if (!currentBeat || beats.length === 0) return;
        const idx = beats.findIndex(b => b.id === currentBeat.id);
        const next = beats[(idx + 1) % beats.length];
        audioRef.current.src = next.url; audioRef.current.play();
        setCurrentBeat(next); setIsPlaying(true);
      }, [currentBeat, beats]);

      const playPrev = useCallback(() => {
        if (!currentBeat || beats.length === 0) return;
        const idx = beats.findIndex(b => b.id === currentBeat.id);
        const prev = beats[(idx - 1 + beats.length) % beats.length];
        audioRef.current.src = prev.url; audioRef.current.play();
        setCurrentBeat(prev); setIsPlaying(true);
      }, [currentBeat, beats]);

      const handleSeek = useCallback(pct => { if (duration) audioRef.current.currentTime = pct * duration; }, [duration]);

      useEffect(() => {
        const audio = audioRef.current;
        const onTime = () => setProgress(audio.currentTime);
        const onDur = () => {
          setDuration(audio.duration);
          if (currentBeat) setBeats(prev => prev.map(b => b.id === currentBeat.id ? { ...b, duration: formatTime(audio.duration), durationSec: audio.duration } : b));
        };
        const onEnd = () => playNext();
        audio.addEventListener("timeupdate", onTime);
        audio.addEventListener("loadedmetadata", onDur);
        audio.addEventListener("ended", onEnd);
        return () => { audio.removeEventListener("timeupdate", onTime); audio.removeEventListener("loadedmetadata", onDur); audio.removeEventListener("ended", onEnd); };
      }, [currentBeat, playNext]);

      const handleUpload = (beat) => {
        setBeats(prev => [beat, ...prev]);
        setActiveTab("library");
      };

      return (
        <div style={{ minHeight: "100vh", position: "relative" }}>
          <PageBg />

          <div style={{ position: "relative", zIndex: 1, paddingBottom: currentBeat ? "140px" : "90px", maxWidth: "500px", margin: "0 auto" }}>
            <StatusBar />
            <div style={{ padding: "12px 0 0" }}>
              {activeTab === "home" && <HomeScreen beats={beats} onPlay={playBeat} currentBeat={currentBeat} isPlaying={isPlaying} />}
              {activeTab === "library" && <LibraryScreen beats={beats} onPlay={playBeat} currentBeat={currentBeat} isPlaying={isPlaying} />}
              {activeTab === "upload" && <UploadScreen onUpload={handleUpload} />}
              {activeTab === "profile" && <ProfileScreen />}
            </div>
          </div>

          <MiniPlayer
            beat={currentBeat}
            isPlaying={isPlaying}
            onToggle={() => { if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); } else { audioRef.current.play(); setIsPlaying(true); } }}
            onNext={playNext}
            progress={progress}
            duration={duration}
            onExpand={() => setShowNowPlaying(true)}
          />

          <TabBar active={activeTab} setActive={setActiveTab} hasNowPlaying={!!currentBeat} />

          {showNowPlaying && (
            <NowPlaying
              beat={currentBeat}
              isPlaying={isPlaying}
              onToggle={() => { if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); } else { audioRef.current.play(); setIsPlaying(true); } }}
              onNext={playNext}
              onPrev={playPrev}
              progress={progress}
              duration={duration}
              onSeek={handleSeek}
              onClose={() => setShowNowPlaying(false)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
